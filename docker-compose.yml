services:
  mongo:
    image: mongo:7
    container_name: scraping-mongo
    restart: unless-stopped
    ports:
      - "27777:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  scraper:
    build: .
    container_name: scraping-app
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/scraping
      PROXY: ${PROXY:-}
      TARGET_URLS: ${TARGET_URLS:-}
      TZ: Asia/Kolkata
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/logs

volumes:
  mongo-data:
